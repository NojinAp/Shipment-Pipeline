<svg width="680" height="830" viewBox="0 0 680 830" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Shipment pipeline architecture diagram</title>
<desc>EventBridge triggers a Lambda function hourly that inserts new bookings into RDS Postgres; a separate producer script streams scan events into Kinesis. RDS syncs into Redshift, which unloads to S3; Kinesis flows through Firehose into the same S3 raw zone. From there, Step Functions orchestrates Extract (writes Parquet to extract/preprocessed/), Transform (writes to transform/), and Load, producing the final output in S3 load/.</desc>
